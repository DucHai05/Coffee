services:
  # ==========================================
  # 0. DATABASE: SQL SERVER
  # ==========================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cafe-database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=CafePos@123456
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - cafe-network

  # ==========================================
  # EUREKA SERVER: Trung tâm đăng ký dịch vụ
  # ==========================================
  eureka-server:
    build: ./Backend/EurekaServer
    container_name: cafe-eureka-server
    ports:
      - "8761:8761"
    networks:
      - cafe-network

  # ==========================================
  # API GATEWAY: Cổng duy nhất gọi từ ReactJS
  # ==========================================
  api-gateway:
    build: ./Backend/ServiceAPIGateway
    container_name: cafe-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - cafe-network

  # ==========================================
  # CÁC SERVICE NGHIỆP VỤ
  # ==========================================

  service-cafe:
    build: ./Backend/ServiceCafe
    container_name: cafe-service-cafe
    ports:
      - "8081:8081"
    depends_on:
      - sqlserver
      - eureka-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=ServiceCafe;encrypt=true;trustServerCertificate=true;
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=CafePos@123456
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - cafe-network

  service-promotion:
    build: ./Backend/ServicePromotion
    container_name: cafe-service-promotion
    ports:
      - "8082:8082"
    depends_on:
      - sqlserver
      - eureka-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=ServicePromotion;encrypt=true;trustServerCertificate=true;
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=CafePos@123456
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - cafe-network

  service-table:
